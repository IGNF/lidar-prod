name: lidar_prod
channels:
  - conda-forge
dependencies:
  - python==3.12.*
  - pip
  # --------- linters --------- #
  - pre-commit # hooks for applying linters on commit
  - black # code formatting
  - isort # import sorting
  - flake8 # code analysis
  - rstcheck==3.3.*
  # --------- geo --------- #
  - conda-forge:python-pdal==3.5.*
  - conda-forge:pdal==2.10.*
  - numpy
  - scikit-learn
  - gdal
  - geopandas
  - pyproj
  - laspy
  # --------- others --------- #
  - psycopg2 # database interaction
  - postgis
  - jupyterlab # better jupyter notebooks
  - pudb # debugger
  - rich==11.2.* # rich text formatting
  - pytest>=7.1.2 # tests
  - pytest-cov==3.0.*
  # --------- documentation --------- #
  - sphinx==7.2.*
  - recommonmark==0.7.*
  - sphinx_rtd_theme==2.0.*
  - docutils==0.20.*
  # --------- hydra --------- #
  - hydra-core==1.3.*
  - hydra-colorlog==1.2.*
  - optuna #==4.8.*
  - pip:
      # --------- Documentation --------- #
      - myst_parser==2.0.*
      - sphinx_paramlinks==0.6.*
      - sphinxnotes-mock==1.0.*
      - sphinx-argparse==0.4.*
      - sphinxcontrib-mermaid==0.9.*
      - ign-pdal-tools>=1.5.2
